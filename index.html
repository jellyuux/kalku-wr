<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator WR MLBB Modern - Jelly</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #141318 0%, #232228 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(26, 25, 31, 0.95);
            padding: 40px 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        /* Gaya CSS untuk Header Profil */
        .profile-header {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px dashed rgba(255, 255, 204, 0.1);
        }

        .profile-header img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #ffcc00;
            margin-bottom: 12px;
            object-fit: cover;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);
        }

        .profile-header h1 {
            font-size: 24px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .profile-header p {
            font-size: 13px;
            color: #a0a0a0;
            margin-top: 4px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
            color: #ffcc00;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-subtitle {
            color: #a0a0a0;
            font-size: 13px;
            margin-bottom: 25px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #cdcdcd;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background-color: #232228;
            border: 1px solid #3a393f;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #ffcc00;
            box-shadow: 0 0 8px rgba(255, 204, 0, 0.2);
            background-color: #2a2930;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #c68a0c 0%, #ffcc00 100%);
            border: none;
            color: #1a191f;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 10px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(198, 138, 12, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 204, 0, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            background-color: #232228;
            border-radius: 8px;
            border-left: 4px solid #ffcc00;
            text-align: left;
            display: none;
            animation: fadeIn 0.5s ease;
        }

            from { opacity: 0; transform: translateY(10px
